name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend — lint (ruff) + tests (pytest)
  # Installs only dev.txt which already pins ruff, pytest, httpx, pytest-cov.
  # ML deps (xgboost, shap, catboost …) are NOT installed here; the API tests
  # do not require them and they add ~5 min to the install step.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest --tb=short -q
        env:
          JWT_SECRET: ci-test-secret
          DEBUG: "false"
          OPENROUTER_API_KEY: ""
          DATABASE_URL: ""

  # ---------------------------------------------------------------------------
  # Frontend — lint (eslint) + typecheck (tsc) + build + tests (vitest)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (lint + typecheck + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_BASE: http://localhost:8000

      - name: Test (vitest)
        run: npm run test -- --run
